name: Selcuk Sports HD Güncelle

concurrency:
  group: \( {{ github.workflow }}- \){{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:          # Manuel çalıştırmak için
  schedule:
    - cron: ' 0 * * * *'     # Her 5 dakikada bir

jobs:
  update-selcuk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python 3.11 Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: selcuk.py Çalıştır
        run: python s.py

      - name: Değişiklik Varsa Commit Et
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Selcuk Sports HD kanalları güncellendi"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "selcuk/"
